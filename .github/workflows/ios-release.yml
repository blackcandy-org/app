name: iOS Release

on:
  push:
    tags:
      - 'ios/v*'

jobs:
  build:
    runs-on: macos-latest

    env:
      API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Determine release type
        id: release_type
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#ios/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *.beta* ]] || [[ "$TAG" == *.rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Config.xcconfig
        run: |
          cat > iosApp/iosApp/Configuration/Config.xcconfig <<EOF
          BUNDLE_ID = ${{ secrets.IOS_BUNDLE_ID }}
          TEAM_ID = ${{ secrets.IOS_TEAM_ID }}
          APP_NAME = ${{ secrets.IOS_APP_NAME }}
          EOF

      - name: Set up App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme iosApp \
            -project iosApp/iosApp.xcodeproj \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        if: steps.release_type.outputs.prerelease == 'true'
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/iosApp.xcarchive" \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "iOS v${{ steps.release_type.outputs.version }}"
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          generate_release_notes: true
